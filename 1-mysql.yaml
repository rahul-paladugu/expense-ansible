- name: Ansible playbook to configure mysql for expense project
  hosts: mysql
  become: yes
  tasks:
  # Install mysql-server
    - name: Install mysql
      ansible.builtin.dnf:
        name: mysql-server
        state: present
  # Enable and start mysql service
    - name: Start and enable mysqld service
      ansible.builtin.systemd:
        name: mysqld
        state: started
        enabled: yes
    - name: configure admin credentials to debug
      ansible.builtin.shell: 
       mysql_secure_installation --set-root-pass ExpenseApp@1